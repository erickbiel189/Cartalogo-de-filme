<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de filmes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e50914;
            margin-bottom: 30px;
        }

        .catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .filme-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .filme-card {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            height: 100%;
        }

        .filme-card:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        .filme-card img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            display: block;
        }

        .filme-info {
            padding: 15px;
        }

        .filme-titulo {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .filme-detalhes {
            font-size: 0.9rem;
            color: #aaaaaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nota {
            color: #ffb703;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎬Exemplo de filme </h1>

    <div class="catalogo">

        <a href="https://www.youtube.com/watch?v=pIb3zixhP3A" target="_blank" class="filme-link">
            <div class="filme-card">
                <img src= https://assets.portalleodias.com/2024/04/Guerreiras-do-k-pop.jpg alt="Guerreiras do K-Pop">
                <div class="filme-info">
                    <p class="filme-titulo">Guerreiras do K-Pop</p>
                    <div class="filme-detalhes">
                        <span>2025 • Animação</span>
                        <span class="nota">⭐ 8.5</span>
                    </div>
                </div>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=Kk1R23ZJWMk" target="_blank" class="filme-link">
            <div class="filme-card">
                <img src="https://wp.ufpel.edu.br/empauta/files/2024/03/Foto-2-Divulgacao-Netflix.jpg" alt="Donzela">
                <div class="filme-info">
                    <p class="filme-titulo">Donzela - Trailer 2</p>
                    <div class="filme-detalhes">
                        <span>2024 • Fantasia</span>
                        <span class="nota">⭐ 7.9</span>
                    </div>
                </div>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=SVTdGBEwT00" target="_blank" class="filme-link">
            <div class="filme-card">
                <img src="https://br.web.img2.acsta.net/c_310_420/pictures/22/05/24/16/14/3798761.png" alt="Agente Oculto">
                <div class="filme-info">
                    <p class="filme-titulo">Agente Oculto</p>
                    <div class="filme-detalhes">
                        <span>2022 • Ação</span>
                        <span class="nota">⭐ 9.0</span>
                    </div>
                </div>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=miycJHABS1w" target="_blank" class="filme-link">
            <div class="filme-card">
                <img src="https://m.media-amazon.com/images/M/MV5BZDRmNzcwMGItZjU0Ny00MDZiLWEzNDMtYzQxZjUxMjQxOGIxXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="O Projeto Adam">
                <div class="filme-info">
                    <p class="filme-titulo">O Projeto Adam</p>
                    <div class="filme-detalhes">
                        <span>2022 • Ficção</span>
                        <span class="nota">⭐ 8.2</span>
                    </div>
                </div>
            </div>
        </a>
 

</body>
</html>
